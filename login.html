<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="Sistema de login e registro">
    <title>Login e Registro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- LOGIN -->
        <h2>Login</h2>
        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="loginEmail">Email:</label>
                <input 
                    type="email" 
                    id="loginEmail" 
                    name="email" 
                    autocomplete="email"
                    required
                    aria-required="true">
                <span class="error-message" id="loginEmailError"></span>
            </div>
            <div class="form-group">
                <label for="loginPassword">Senha:</label>
                <input 
                    type="password" 
                    id="loginPassword" 
                    name="password" 
                    autocomplete="current-password"
                    required
                    aria-required="true">
                <span class="error-message" id="loginPasswordError"></span>
            </div>
            <button type="submit" id="loginBtn">Entrar</button>
            <div class="form-message" id="loginMessage"></div>
        </form>

        <!-- REGISTRO -->
        <h2>Registro</h2>
        <form id="registerForm" novalidate>
            <div class="form-group">
                <label for="registerEmail">Email:</label>
                <input 
                    type="email" 
                    id="registerEmail" 
                    name="email" 
                    autocomplete="email"
                    required
                    aria-required="true">
                <span class="error-message" id="registerEmailError"></span>
            </div>
            <div class="form-group">
                <label for="registerPassword">Senha:</label>
                <input 
                    type="password" 
                    id="registerPassword" 
                    name="password" 
                    autocomplete="new-password"
                    required
                    aria-required="true"
                    minlength="8">
                <span class="error-message" id="registerPasswordError"></span>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirmar Senha:</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    autocomplete="new-password"
                    required
                    aria-required="true">
                <span class="error-message" id="confirmPasswordError"></span>
            </div>
            <button type="submit" id="registerBtn">Registrar</button>
            <div class="form-message" id="registerMessage"></div>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
